name: SecOndary
options:
  bundleIdPrefix: app.sec
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1.0"
targets:
  SecOndary:
    type: application
    platform: iOS
    sources:
      - path: SecOndary/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sec.ondary
        INFOPLIST_FILE: SecOndary/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
    scheme: {}
